name: Agents CI/CD

'on':
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore --configuration Release
    
    - name: Run unit tests
      run: dotnet test --no-build --configuration Release --verbosity normal
    
    - name: Run integration tests with OpenAI
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_AGENTS_1 }}
      run: |
        if [ -n "$OPENAI_API_KEY" ]; then
          echo "Running OpenAI integration test..."
          dotnet run --project tests/MCPMathTools.AI.Tests --configuration Release
        else
          echo "Skipping OpenAI integration tests - OPENAI_API_KEY not available"
        fi
    
    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: '.NET Tests'
        path: '**/TestResults/*.xml'
        reporter: dotnet-trx

  ai-validation:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore --configuration Release
    
    - name: AI Validation Test
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_AGENTS_1 }}
      run: |
        if [ -n "$OPENAI_API_KEY" ]; then
          echo "Running AI validation against MCP math tools..."
          dotnet run --project tests/MCPMathTools.AI.Tests --configuration Release
        else
          echo "Skipping AI validation tests - OPENAI_API_KEY not available"
        fi
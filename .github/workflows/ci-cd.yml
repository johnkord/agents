name: Agents CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore --configuration Release
    
    - name: Run unit tests
      run: dotnet test --no-build --configuration Release --verbosity normal
    
    - name: Run integration tests with OpenAI
      if: ${{ secrets.OPENAI_AGENTS_1 != '' }}
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_AGENTS_1 }}
      run: |
        echo "Starting MCP Server..."
        cd src/MCPServer
        timeout 30s dotnet run --configuration Release &
        SERVER_PID=$!
        sleep 5
        
        echo "Running OpenAI integration test..."
        cd ../../../
        dotnet run --project tests/MCPMathTools.AI.Tests --configuration Release
        
        echo "Stopping MCP Server..."
        kill $SERVER_PID || true
    
    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: '.NET Tests'
        path: '**/TestResults/*.xml'
        reporter: dotnet-trx

  ai-validation:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: ${{ secrets.OPENAI_AGENTS_1 != '' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore --configuration Release
    
    - name: AI Validation Test
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_AGENTS_1 }}
      run: |
        echo "Running AI validation against MCP math tools..."
        cd tests/MCPMathTools.AI.Tests
        dotnet run --configuration Release
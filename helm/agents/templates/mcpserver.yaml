{{- if .Values.mcpserver.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agents.fullname" . }}-mcpserver
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcpserver
spec:
  replicas: {{ .Values.mcpserver.replicaCount }}
  selector:
    matchLabels:
      {{- include "agents.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcpserver
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "agents.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mcpserver
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "agents.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: mcpserver
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ include "agents.imageRegistry" . }}/{{ .Values.images.mcpserver.repository }}:{{ .Values.images.mcpserver.tag }}"
          imagePullPolicy: {{ .Values.images.mcpserver.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:3000"
            - name: MCP_SERVER_URL
              value: "http://{{ include "agents.fullname" . }}-mcpserver:3000"
          envFrom:
            - configMapRef:
                name: {{ include "agents.fullname" . }}-config
            - secretRef:
                name: {{ include "agents.fullname" . }}-secrets
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.mcpserver.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agents.fullname" . }}-mcpserver
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcpserver
spec:
  type: {{ .Values.mcpserver.service.type }}
  ports:
    - port: {{ .Values.mcpserver.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "agents.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mcpserver
{{- end }}
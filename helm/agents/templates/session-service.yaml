{{- if .Values.sessionService.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agents.fullname" . }}-session-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: session-service
spec:
  replicas: {{ .Values.sessionService.replicaCount }}
  selector:
    matchLabels:
      {{- include "agents.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: session-service
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "agents.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: session-service
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "agents.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: session-service
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.global.registry }}/{{ .Values.images.sessionService.repository }}:{{ .Values.images.sessionService.tag }}"
          imagePullPolicy: {{ .Values.images.sessionService.pullPolicy }}
          ports:
            - name: http
              containerPort: 5001
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: {{ .Values.config.aspnetcore.environment }}
            - name: ASPNETCORE_URLS
              value: "http://+:5001"
            - name: AGENT_SESSION_DB_PATH
              value: "/app/data/agent_sessions.db"
            - name: Logging__LogLevel__Default
              value: {{ .Values.config.logging.level.default }}
            - name: Logging__LogLevel__Microsoft
              value: {{ .Values.config.logging.level.microsoft }}
            - name: Logging__LogLevel__Microsoft.Hosting.Lifetime
              value: {{ .Values.config.logging.level.microsoftHostingLifetime }}
          volumeMounts:
            - name: shared-data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /api/sessions
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/sessions
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.sessionService.resources | nindent 12 }}
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: {{ include "agents.fullname" . }}-shared-data
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agents.fullname" . }}-session-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: session-service
spec:
  type: {{ .Values.sessionService.service.type }}
  ports:
    - port: {{ .Values.sessionService.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "agents.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: session-service
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agents.fullname" . }}-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "agents.labels" . | nindent 4 }}
type: Opaque
data:
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | b64enc | quote }}
  REST_AUTH_TOKEN: {{ .Values.secrets.restAuthToken | b64enc | quote }}
{{- if .Values.approvalService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agents.fullname" . }}-approval-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: approval-service
spec:
  replicas: {{ .Values.approvalService.replicaCount }}
  selector:
    matchLabels:
      {{- include "agents.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: approval-service
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "agents.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: approval-service
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "agents.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: approval-service
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ include "agents.imageRegistry" . }}/{{ .Values.images.approvalService.repository }}:{{ .Values.images.approvalService.tag }}"
          imagePullPolicy: {{ .Values.images.approvalService.pullPolicy }}
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:5000"
            - name: REST_BASE_URL
              value: "http://{{ include "agents.fullname" . }}-approval-service:5000"
          envFrom:
            - configMapRef:
                name: {{ include "agents.fullname" . }}-config
            - secretRef:
                name: {{ include "agents.fullname" . }}-secrets
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.approvalService.resources | nindent 12 }}
          {{- if .Values.approvalService.persistence.enabled }}
          volumeMounts:
            - name: approval-data
              mountPath: /app/data
          {{- end }}
      {{- if .Values.approvalService.persistence.enabled }}
      volumes:
        - name: approval-data
          persistentVolumeClaim:
            claimName: {{ include "agents.fullname" . }}-approval-data
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agents.fullname" . }}-approval-service
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: approval-service
spec:
  type: {{ .Values.approvalService.service.type }}
  ports:
    - port: {{ .Values.approvalService.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "agents.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: approval-service
{{- if .Values.approvalService.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "agents.fullname" . }}-approval-data
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: approval-service
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.approvalService.persistence.size }}
  {{- if .Values.approvalService.persistence.storageClass }}
  storageClassName: {{ .Values.approvalService.persistence.storageClass }}
  {{- end }}
{{- end }}
{{- end }}
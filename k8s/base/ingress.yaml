apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agents-ingress
  namespace: agents
  annotations:
    kubernetes.io/ingress.class: "azure/application-gateway"
    appgw.ingress.kubernetes.io/ssl-redirect: "false"
    appgw.ingress.kubernetes.io/use-private-ip: "false"
spec:
  rules:
  - host: agents.example.com  # Replace with your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: approval-service-service
            port:
              number: 5000
      - path: /mcp
        pathType: Prefix
        backend:
          service:
            name: mcpserver-service
            port:
              number: 3000
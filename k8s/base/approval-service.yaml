apiVersion: apps/v1
kind: Deployment
metadata:
  name: approval-service
  namespace: agents
  labels:
    app: approval-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: approval-service
  template:
    metadata:
      labels:
        app: approval-service
    spec:
      containers:
      - name: approval-service
        image: approval-service:latest
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: ASPNETCORE_URLS
          value: "http://+:5000"
        - name: REST_BASE_URL
          value: "http://approval-service-service:5000"
        envFrom:
        - configMapRef:
            name: agents-config
        - secretRef:
            name: agents-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        - name: approval-data
          mountPath: /app/data
      volumes:
      - name: approval-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: approval-service-service
  namespace: agents
spec:
  selector:
    app: approval-service
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
  type: ClusterIP
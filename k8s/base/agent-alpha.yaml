apiVersion: batch/v1
kind: Job
metadata:
  name: agent-alpha-job
  namespace: agents
  labels:
    app: agent-alpha
spec:
  template:
    metadata:
      labels:
        app: agent-alpha
    spec:
      restartPolicy: OnFailure
      containers:
      - name: agent-alpha
        image: agent-alpha:latest
        command: ["dotnet", "AgentAlpha.dll"]
        args: ["--verbose", "test"]  # Can be overridden in overlays
        env:
        - name: MCP_SERVER_URL
          value: "http://mcpserver-service:3000"
        - name: REST_BASE_URL
          value: "http://approval-service-service:5000"
        - name: AGENT_MODEL
          value: "gpt-4.1-nano"  # Default model
        - name: AGENT_TEMPERATURE
          value: "0.7"  # Default temperature
        - name: AGENT_MAX_ITERATIONS
          value: "10"  # Default max iterations
        - name: AGENT_TIMEOUT_MINUTES
          value: "5"  # Default timeout in minutes
        envFrom:
        - configMapRef:
            name: agents-config
        - secretRef:
            name: agents-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
# Alternative: CronJob for scheduled agent runs
apiVersion: batch/v1
kind: CronJob
metadata:
  name: agent-alpha-cronjob
  namespace: agents
  labels:
    app: agent-alpha-cron
spec:
  schedule: "0 */6 * * *"  # Run every 6 hours
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: agent-alpha-cron
        spec:
          restartPolicy: OnFailure
          containers:
          - name: agent-alpha
            image: agent-alpha:latest
            command: ["dotnet", "AgentAlpha.dll"]
            args: ["--verbose", "test"]  # Can be overridden in overlays
            env:
            - name: MCP_SERVER_URL
              value: "http://mcpserver-service:3000"
            - name: REST_BASE_URL
              value: "http://approval-service-service:5000"
            - name: AGENT_MODEL
              value: "gpt-4.1-nano"  # Default model
            - name: AGENT_TEMPERATURE
              value: "0.7"  # Default temperature
            - name: AGENT_MAX_ITERATIONS
              value: "10"  # Default max iterations
            - name: AGENT_TIMEOUT_MINUTES
              value: "5"  # Default timeout in minutes
            envFrom:
            - configMapRef:
                name: agents-config
            - secretRef:
                name: agents-secrets
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "200m"
apiVersion: v1
kind: Namespace
metadata:
  name: agents
  labels:
    name: agents
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agents-config
  namespace: agents
data:
  # MCP Server Configuration
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:5000"
  MCP_TRANSPORT: "sse"
  
  # Logging Configuration
  LOGGING__LOGLEVEL__DEFAULT: "Information"
  LOGGING__LOGLEVEL__MICROSOFT: "Warning"
  LOGGING__LOGLEVEL__MICROSOFT_HOSTING_LIFETIME: "Information"
  
  # AgentAlpha Configuration
  AGENT_MAX_ITERATIONS: "10"
  AGENT_TIMEOUT_SECONDS: "300"
  MCP_SERVER_URL: "http://mcp-server:5000"
---
apiVersion: v1
kind: Secret
metadata:
  name: agents-secrets
  namespace: agents
type: Opaque
data:
  # Base64 encoded OpenAI API key - replace with actual key
  # To encode: echo -n "your_openai_api_key_here" | base64
  OPENAI_API_KEY: eW91cl9vcGVuYWlfYXBpX2tleV9oZXJl  # "your_openai_api_key_here"
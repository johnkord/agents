apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: agents
  labels:
    app: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
      - name: mcp-server
        image: mcp-server:latest  # Replace with your registry/image
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        env:
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: agents-config
              key: ASPNETCORE_ENVIRONMENT
        - name: ASPNETCORE_URLS
          valueFrom:
            configMapKeyRef:
              name: agents-config
              key: ASPNETCORE_URLS
        - name: MCP_TRANSPORT
          valueFrom:
            configMapKeyRef:
              name: agents-config
              key: MCP_TRANSPORT
        - name: LOGGING__LOGLEVEL__DEFAULT
          valueFrom:
            configMapKeyRef:
              name: agents-config
              key: LOGGING__LOGLEVEL__DEFAULT
        - name: LOGGING__LOGLEVEL__MICROSOFT
          valueFrom:
            configMapKeyRef:
              name: agents-config
              key: LOGGING__LOGLEVEL__MICROSOFT
        - name: LOGGING__LOGLEVEL__MICROSOFT_HOSTING_LIFETIME
          valueFrom:
            configMapKeyRef:
              name: agents-config
              key: LOGGING__LOGLEVEL__MICROSOFT_HOSTING_LIFETIME
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - dotnet
            - --list-runtimes
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - dotnet
            - --list-runtimes
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  namespace: agents
  labels:
    app: mcp-server
spec:
  selector:
    app: mcp-server
  ports:
  - name: http
    port: 5000
    targetPort: 5000
    protocol: TCP
  type: ClusterIP